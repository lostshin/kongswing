name = "kongswing"
compatibility_date = "2026-01-14"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# 聯絡表單 → Email Routing 寄信（必須在 Cloudflare 端設定，不能寫在 wrangler.toml：
# Pages 的 wrangler config 驗證器不支援 [[send_email]] binding，會直接擋下 build。
# 一次性設定步驟：
# 1. 於 kongswing.cc zone 開啟 Email Routing
# 2. 驗證一個目的信箱（例如 luljidjemeli@gmail.com）
# 3. Pages 專案 → Settings → Functions → Email bindings → 新增名為 "SEB"，destination 為已驗證的信箱
# 4. Pages 專案 → Settings → Variables 設定 CONTACT_SENDER 與 CONTACT_RECIPIENT
